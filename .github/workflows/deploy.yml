name: Promote

on:
  workflow_dispatch:
    inputs:
      promote_to:
        description: "Highest environment to promote this version to"
        required: true
        default: dev
        type: choice
        options:
          - dev
          - uat
          - prod
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: promote-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-dev:
    name: Deploy Dev
    runs-on: ubuntu-latest
    environment:
      name: dev
      url: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/dev/
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Dev bundle
        shell: bash
        run: |
          mkdir -p dist/dev
          cp index.html styles.css app.js dist/dev/
          cat > dist/dev/config.js <<'EOF'
          window.APP_CONFIG = {
            environment: "dev"
          };
          EOF

      - name: Publish Dev
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/dev
          destination_dir: dev
          keep_files: true

  deploy-uat:
    name: Deploy UAT
    needs: deploy-dev
    if: ${{ github.event_name == 'push' || inputs.promote_to == 'uat' || inputs.promote_to == 'prod' }}
    runs-on: ubuntu-latest
    environment:
      name: uat
      url: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/uat/
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build UAT bundle
        shell: bash
        run: |
          mkdir -p dist/uat
          cp index.html styles.css app.js dist/uat/
          cat > dist/uat/config.js <<'EOF'
          window.APP_CONFIG = {
            environment: "uat"
          };
          EOF

      - name: Publish UAT
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/uat
          destination_dir: uat
          keep_files: true

  deploy-prod:
    name: Deploy Prod
    needs: deploy-uat
    if: ${{ github.event_name == 'push' || inputs.promote_to == 'prod' }}
    runs-on: ubuntu-latest
    environment:
      name: prod
      url: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/prod/
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Prod bundle
        shell: bash
        run: |
          mkdir -p dist/prod
          cp index.html styles.css app.js dist/prod/
          cat > dist/prod/config.js <<'EOF'
          window.APP_CONFIG = {
            environment: "prod"
          };
          EOF

      - name: Publish Prod
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/prod
          destination_dir: prod
          keep_files: true
