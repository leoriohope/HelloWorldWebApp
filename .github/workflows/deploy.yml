name: Deploy

on:
  push:
    branches:
      - main
      - develop
      - "release/**"
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy"
        required: true
        default: dev
        type: choice
        options:
          - dev
          - uat
          - prod

permissions:
  contents: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  choose-environment:
    name: Choose environment
    runs-on: ubuntu-latest
    outputs:
      app_environment: ${{ steps.resolve.outputs.app_environment }}
    steps:
      - name: Resolve deployment environment
        id: resolve
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "app_environment=${{ inputs.environment }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "app_environment=prod" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref }}" = "refs/heads/develop" ]; then
            echo "app_environment=dev" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref }}" == refs/heads/release/* ]]; then
            echo "app_environment=uat" >> "$GITHUB_OUTPUT"
          else
            echo "Unsupported branch: ${{ github.ref }}"
            exit 1
          fi

  deploy:
    name: Deploy to GitHub Pages
    needs: choose-environment
    runs-on: ubuntu-latest
    environment: ${{ needs.choose-environment.outputs.app_environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build static bundle
        shell: bash
        run: |
          mkdir -p "dist/${{ needs.choose-environment.outputs.app_environment }}"
          cp index.html styles.css app.js "dist/${{ needs.choose-environment.outputs.app_environment }}/"
          cat > "dist/${{ needs.choose-environment.outputs.app_environment }}/config.js" <<'EOF'
          window.APP_CONFIG = {
            environment: "${{ needs.choose-environment.outputs.app_environment }}"
          };
          EOF

      - name: Publish environment folder
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/${{ needs.choose-environment.outputs.app_environment }}
          destination_dir: ${{ needs.choose-environment.outputs.app_environment }}
          keep_files: true
