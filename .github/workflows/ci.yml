name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop
      - "release/**"

permissions:
  contents: read

jobs:
  validate:
    name: Validate static app
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify required files
        shell: bash
        run: |
          test -f index.html
          test -f styles.css
          test -f app.js
          test -f config.js

      - name: Verify page content
        shell: bash
        run: |
          grep -q "Hello World" index.html
          grep -q "APP_CONFIG" config.js
